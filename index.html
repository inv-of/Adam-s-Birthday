<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#f8f4ef,#efe8de);
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Glow */

.background-blur{

    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,
    rgba(255,255,255,.8),
    transparent 70%);
    filter:blur(40px);
    z-index:0;

}

.container{

    position:relative;
    z-index:2;

    width:100%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    align-items:center;

}

/* ========================= */

.title-card{

    width:220px;

    background:white;

    border-radius:6px;

    padding:18px;

    text-align:center;

    box-shadow:0 12px 30px rgba(0,0,0,.08);

    margin-bottom:-30px;

    z-index:5;

}

.love{

    display:block;

    font-size:12px;

    letter-spacing:6px;

    color:#777;

    margin-bottom:10px;

}

.title-card h2{

    font-weight:400;

    font-size:27px;

    color:#444;

}

/* ========================= */

.envelope{

    width:330px;

    position:relative;

    transition:.6s;

}

.envelope-img{

    width:100%;

    display:block;

    filter:drop-shadow(0 18px 30px rgba(0,0,0,.15));

}

/* الختم */

.seal{

    width:75px;

    position:absolute;

    left:50%;

    bottom:55px;

    transform:translateX(-50%);

    transition:.5s;

}

/* ========================= */

.lock{

    margin-top:35px;

    font-size:38px;

    color:#b08a67;

}

/* ========================= */

.secret-text{

    margin-top:12px;

    letter-spacing:5px;

    font-size:12px;

    color:#777;

    margin-bottom:18px;

}

/* ========================= */

.input-box{

    width:100%;

    display:flex;

    justify-content:center;

}

input{

    width:290px;

    height:54px;

    border:none;

    outline:none;

    border-radius:30px;

    background:#d9d9d9;

    text-align:center;

    font-size:17px;

    transition:.3s;

    color:#555;

}

input:focus{

    background:#ececec;

    box-shadow:0 0 18px rgba(0,0,0,.12);

}

/* ========================= */

button{

    margin-top:22px;

    width:180px;

    height:52px;

    border:none;

    border-radius:30px;

    background:#b84640;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:.35s;

    box-shadow:0 10px 20px rgba(184,70,64,.3);

}

button:hover{

    transform:translateY(-3px);

}

button:active{

    transform:scale(.96);

}

/* ========================= */

#error{

    margin-top:18px;

    color:#c54242;

    font-size:14px;

    display:none;

}

/* Shake */

.shake{

    animation:shake .4s;

}

@keyframes shake{

0%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-6px);}
80%{transform:translateX(6px);}
100%{transform:translateX(0);}

}

/* فتح الظرف */

.open{

    transform:translateY(-15px) scale(1.03);

}

/* لمعان الختم */

.glow{

    animation:glow 1s infinite;

}

@keyframes glow{

0%{

filter:
drop-shadow(0 0 0px #fff);

}

50%{

filter:
drop-shadow(0 0 20px #ffefc1);

}

100%{

filter:
drop-shadow(0 0 0px #fff);

}

}

/* Fade */

.fade{

    animation:fade .8s forwards;

}

@keyframes fade{

to{

opacity:0;
visibility:hidden;

}

}

/* Responsive */

@media(max-width:500px){

.envelope{

width:280px;

}

.title-card{

width:200px;

}

.title-card h2{

font-size:22px;

}

input{

width:260px;

}

}
</style>
</head>

<body>

<div class="background-blur"></div>

<div class="container">

    <!-- Card -->
     <p class="secret-text">

        LOVE<br>
        my everything ❤️

    </p>
    

    <!-- Envelope -->

    <div class="envelope" id="envelope">

        <img src="envelope.png" class="envelope-img">

    </div>

    <!-- Lock -->

    <div class="lock">

        🔒

    </div>

    <p class="secret-text">

        ENTER THE SECRET WORD

    </p>

    <!-- Password -->

    <div class="input-box">

        <input

        id="password"

        type="password"

        placeholder="✦ password ✦"

        autocomplete="off">

    </div>

    <!-- Button -->

    <button id="unlockBtn">

        💕 Unlock 💕

    </button>

    <p id="error">

        Wrong Secret Word 🤍

    </p>

</div>

<script>
    const correctPassword = "مرهم"; 

const input = document.getElementById("password");
const button = document.getElementById("unlockBtn");
const error = document.getElementById("error");

const envelope = document.getElementById("envelope");
const seal = document.getElementById("seal");

// =========================

button.addEventListener("click", unlock);

input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        unlock();
    }

});

    function unlock(){

    if(input.value.trim() === "مرهم"){

        alert("Correct Password");

        window.location.href = "main.html";

    }else{

        alert("Wrong Password");

    }

}



    function wrongPassword(){

    error.style.display = "block";

    input.classList.add("shake");

    input.style.border = "2px solid #d9534f";

    input.focus();

    navigator.vibrate?.(150);

    setTimeout(()=>{

        input.classList.remove("shake");

    },400);

}

    function successAnimation(){
        alert("Success");
    error.style.display = "none";

    input.disabled = true;

    button.disabled = true;

    button.innerHTML = "Unlocking...";

    // لمعان الختم

    seal.classList.add("glow");

    // حركة الظرف

    setTimeout(()=>{

        envelope.classList.add("open");

    },400);

    // Fade

    setTimeout(()=>{

        document.body.classList.add("fade");

    },1500);

    // الانتقال

    setTimeout(()=>{

        window.location.href="main.html";

    },500);

}
</script>

</body>

</html>
